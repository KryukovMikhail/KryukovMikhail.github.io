<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mikhail Kryukov</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #0b0b0b;
  color: white;
}

/* HERO */
.hero {
  padding: 100px 20px 40px;
  max-width: 1000px;
  margin: auto;
}

.hero h1 {
  font-size: 48px;
  margin: 0;
}

.hero p {
  color: #aaa;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

/* CARD */
.card {
  background: #111;
  border: 1px solid #1f1f1f;
  padding: 20px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
  border-color: #444;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  max-width: 700px;
  background: #111;
  padding: 30px;
  border-radius: 10px;
}

.close {
  cursor: pointer;
  float: right;
  font-size: 20px;
  color: #aaa;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Mikhail Kryukov</h1>
  <p>Senior System Analyst / Solution Analyst</p>
</div>

<div class="grid">

  <div class="card" onclick="openCase('case1')">
    <h3>Payment Integration</h3>
    <p>Fintech API & transaction flow</p>
  </div>

  <div class="card" onclick="openCase('case2')">
    <h3>CRM System</h3>
    <p>System interactions & business logic</p>
  </div>

  <div class="card" onclick="openCase('case3')">
    <h3>ERP (1C)</h3>
    <p>Process modeling & automation</p>
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeCase()">✕</span>
    <div id="modal-body"></div>
  </div>
</div>

<script>
function openCase(caseId) {
  const content = {
    case1: `
      <h2>Payment Integration Platform</h2>
      <p><b>Context:</b> Fintech system with external payment providers</p>
      <p><b>What I did:</b></p>
      <ul>
        <li>Designed REST APIs</li>
        <li>Defined integration flows</li>
        <li>Created sequence diagrams</li>
      </ul>
      <p><b>Impact:</b> Reduced transaction errors, improved reliability</p>
    `,
    case2: `
      <h2>CRM System Architecture</h2>
      <p><b>Context:</b> Internal CRM system</p>
      <p><b>What I did:</b></p>
      <ul>
        <li>Defined system interactions</li>
        <li>Documented API contracts</li>
        <li>Aligned frontend & backend</li>
      </ul>
      <p><b>Impact:</b> Faster development, fewer misunderstandings</p>
    `,
    case3: `
      <h2>ERP Implementation (1C)</h2>
      <p><b>Context:</b> Enterprise resource planning system</p>
      <p><b>What I did:</b></p>
      <ul>
        <li>Modeled business processes (BPMN, IDEF0)</li>
        <li>Wrote technical specifications</li>
        <li>Supported implementation</li>
      </ul>
      <p><b>Impact:</b> Improved planning and reporting</p>
    `
  };

  document.getElementById("modal-body").innerHTML = content[caseId];
  document.getElementById("modal").style.display = "flex";
}

function closeCase() {
  document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
