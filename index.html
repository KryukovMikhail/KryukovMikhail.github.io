<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mikhail Kryukov</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #0b0b0b;
  color: white;
}

/* NAV */
.nav {
  padding: 20px;
  text-align: center;
  border-bottom: 1px solid #222;
}

.nav span {
  margin: 0 15px;
  cursor: pointer;
  color: #aaa;
}

.nav span:hover {
  color: white;
}

/* PAGES */
.page {
  display: none;
  max-width: 1000px;
  margin: auto;
  padding: 60px 20px;
}

.active {
  display: block;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

/* CARD */
.card {
  background: #111;
  padding: 20px;
  border-radius: 10px;
  border: 1px solid #1f1f1f;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
  border-color: #444;
}

/* BACK */
.back {
  cursor: pointer;
  color: #888;
  margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="nav">
  <span onclick="showPage('home')">Home</span>
  <span onclick="showPage('about')">About</span>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <h1>Mikhail Kryukov</h1>
  <p>Senior System Analyst</p>

  <div class="grid">

    <div class="card" onclick="openCase('payment')">
      <h3>Payment Integration</h3>
      <p>Fintech API</p>
    </div>

    <div class="card" onclick="openCase('crm')">
      <h3>CRM System</h3>
      <p>Architecture</p>
    </div>

    <div class="card" onclick="openCase('erp')">
      <h3>ERP (1C)</h3>
      <p>Process modeling</p>
    </div>

  </div>
</div>

<!-- ABOUT -->
<div id="about" class="page">
  <h2>About</h2>
  <p>
    Senior System Analyst with 18+ years of experience in fintech,
    system integration, and architecture.
  </p>
</div>

<!-- CASE PAGE -->
<div id="case" class="page">
  <div class="back" onclick="showPage('home')">← Back</div>
  <div id="case-content"></div>
</div>

<script>
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

function openCase(id) {
  const cases = {
    payment: `
      <h2>Payment Integration Platform</h2>
      <p><b>Context:</b> fintech integrations</p>
      <p><b>What I did:</b></p>
      <ul>
        <li>Designed REST APIs</li>
        <li>Built integration flows</li>
        <li>Created sequence diagrams</li>
      </ul>
      <p><b>Impact:</b> improved reliability</p>
    `,
    crm: `
      <h2>CRM Architecture</h2>
      <p>Defined system interactions and API contracts</p>
    `,
    erp: `
      <h2>ERP System</h2>
      <p>Modeled processes (BPMN, IDEF0)</p>
    `
  };

  document.getElementById("case-content").innerHTML = cases[id];
  showPage('case');
}
</script>

</body>
</html>
